spring.application.name=ai-shop
spring.config.import=optional:classpath:secrets.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/AI_E-Commerce
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.gemini.api-key=${gemini.key}

app.jwt.secret=${jwt.secret}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${mail.username}
spring.mail.password=${mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${mail.username}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

server.port=8080
server.error.include-message=always
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging.level.com.aishop=DEBUG
logging.level.org.springframework.security=INFO

